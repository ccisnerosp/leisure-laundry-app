name: leisure
description: "Leisure Laundry Mobile Application - Digitalización de procesos operativos"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Backend / Auth / Realtime
  supabase_flutter: ^2.5.6

  # Gestión de estado
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Persistencia local offline
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # Notificaciones locales y sonido (alerta fin de ciclo OM-01)
  flutter_local_notifications: ^17.2.2
  audioplayers: ^6.0.0
  timezone: ^0.9.4

  # Almacenamiento seguro de sesión
  flutter_secure_storage: ^9.2.2

  # Variables de entorno sin hardcodear secretos
  envied: ^0.5.4+1

  # Navegación
  go_router: ^14.2.0

  # Sprint 2 · conectividad y sincronización offline
  connectivity_plus: ^6.0.5
  uuid: ^4.4.0

  # Sprint 3 · notificaciones push (FCM)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Codegen
  build_runner: ^2.4.11
  isar_generator: ^3.1.0+1
  riverpod_generator: ^2.4.0
  envied_generator: ^0.5.4+1

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
